<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>ChatFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/chat.css">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <strong id="me-name">...</strong>
                <button class="btn-logout" id="logout-btn">Выйти</button>
            </div>

            <div style="padding:10px 12px">
                <input style="width:100%;padding:8px 12px;border:1px solid var(--border);
               border-radius:8px;background:var(--navy);color:var(--text);font-size:13px;outline:none"
                       type="text" id="search" placeholder="Поиск...">
            </div>
            <ul class="users-list" id="users-list"></ul>
        </aside>

        <main class="chat-area" id="chat-area">
            <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted)">
                Выберите собеседника
            </div>
        </main>
    </div>
    <script src="js/db.js"></script>
    <script src="js/api.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/soap.js"></script>
</body>
</html>
